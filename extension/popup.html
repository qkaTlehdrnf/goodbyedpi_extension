<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="card">
      <div class="header">
        <img src="icons/icon48.png" width="28" height="28" alt="" />
        <div class="title">GoodbyeDPI <span>for Chrome</span></div>
      </div>

      <button id="toggle" class="toggle off" aria-pressed="false">
        <span class="knob"></span>
        <span class="label">OFF</span>
      </button>

      <div class="status">
        <div class="row">
          <span class="dot" id="proxyDot"></span>
          <span id="proxyText">Proxy: off</span>
        </div>
        <div class="row">
          <span class="dot" id="backendDot"></span>
          <span id="backendText">Checking backend…</span>
        </div>
      </div>

      <div id="hint" class="hint hidden"></div>

      <div class="footer">
        <span id="endpoint">127.0.0.1:1080</span>
        <a id="openOptions" href="#">Settings</a>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
